# Manually-maintained rate entries for lenders without an automated scraper.
#
# These get merged into the live rates dataset at build time, so they appear
# alongside the scraper output on the site. Refresh by visiting each source_url
# below, copying the current posted/discounted rates, and updating
# `last_verified` to today's date.
#
# When/if a real scraper is built for one of these lenders, remove its entry
# from this file — the scraper output will take over.

