name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scraper:
    name: Scraper tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

  site:
    name: Site build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm run build

      - run: npm run test
